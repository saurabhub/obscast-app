name: Build OBSCast APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Extract ZIP
        run: unzip OBSCast_GitHub_Upload.zip

      - name: Build APK
        run: |
          cd OBSCast_GitHub_Upload/android-app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OBSCast-debug
          path: OBSCast_GitHub_Upload/android-app/app/build/outputs/apk/debug/*.apk
