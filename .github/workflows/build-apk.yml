name: Build OBSCast APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Extract ZIP
        run: unzip OBSCast_GitHub_Upload.zip -d extracted
      - name: Build APK
        run: |
          cp -r extracted/OBSCast_GitHub_Upload/android-app ./android-app
          chmod +x android-app/gradlew
          cd android-app && ./gradlew assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: OBSCast-v1.0-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
